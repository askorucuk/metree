name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write # Bu sefer içeriği (gh-pages dalını) yazma yetkisi lazım

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Create JSON file
        shell: bash
        run: echo "VITE_METREE_SECRET_DATA='${{ secrets.METREE_SECRET_DATA }}'" > .env

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages